name: Manuel Build Fabrikası

on:
  workflow_dispatch: # Bu satır sayesinde "Actions" sekmesinden düğmeye basıp kendiniz başlatabileceksiniz.
  push:
    tags:
      - 'v*' # v1.0.0 gibi bir etiket attığınızda otomatik çalışır.

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Uygulamayı Paketle (PyInstaller)
      run: |
        pyinstaller --noconfirm --windowed --onefile --collect-all customtkinter --name "GSB-Wifi-Manager" gsb_app.py

    - name: Dosyaları Hazırla (Windows)
      if: runner.os == 'Windows'
      run: |
        cd dist
        Compress-Archive -Path GSB-Wifi-Manager.exe -DestinationPath GSB-Wifi-Manager-Windows.zip

    - name: Dosyaları Hazırla (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r GSB-Wifi-Manager-macOS.zip GSB-Wifi-Manager.app

    - name: Üretilen Dosyaları GitHub'a Yükle
      uses: actions/upload-artifact@v4
      with:
        name: GSB-Wifi-Build-${{ matrix.os }}
        path: |
          dist/*.zip
